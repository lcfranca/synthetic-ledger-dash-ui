services:
  master-data:
    build:
      context: .
      dockerfile: master_data/Dockerfile
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped
    volumes:
      - master_data_store:/data
    ports:
      - "8091:8091"

  zookeeper:
    image: zookeeper:3.9
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status | grep -q 'Mode:'"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    mem_limit: ${KAFKA_MEM_LIMIT:-768m}
    cpus: ${KAFKA_CPU_LIMIT:-1.0}
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 12
    ports:
      - "9092:9092"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    mem_limit: ${CLICKHOUSE_MEM_LIMIT:-1536m}
    cpus: ${CLICKHOUSE_CPU_LIMIT:-2.0}
    volumes:
      - ./infra/clickhouse/init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      - CLICKHOUSE_DB=ledger
    ports:
      - "8123:8123"
      - "9000:9000"

  druid-postgres:
    image: postgres:16-alpine
    mem_limit: ${DRUID_POSTGRES_MEM_LIMIT:-512m}
    cpus: ${DRUID_POSTGRES_CPU_LIMIT:-0.75}
    environment:
      - POSTGRES_DB=druid
      - POSTGRES_USER=druid
      - POSTGRES_PASSWORD=druid
    volumes:
      - druid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druid -d druid"]
      interval: 10s
      timeout: 5s
      retries: 12

  druid-coordinator:
    image: apache/druid:29.0.1
    mem_limit: ${DRUID_COORDINATOR_MEM_LIMIT:-384m}
    cpus: ${DRUID_COORDINATOR_CPU_LIMIT:-0.75}
    command: ["coordinator"]
    depends_on:
      zookeeper:
        condition: service_started
      druid-postgres:
        condition: service_healthy
    environment:
      - DRUID_XMS=${DRUID_COORDINATOR_XMS:-128m}
      - DRUID_XMX=${DRUID_COORDINATOR_XMX:-128m}
      - druid_zk_service_host=zookeeper:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://druid-postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/shared/segments
      - druid_indexer_logs_type=file
      - druid_indexer_logs_directory=/opt/shared/indexing-logs
      - druid_extensions_loadList=["druid-kafka-indexing-service","postgresql-metadata-storage"]
    volumes:
      - druid_shared:/opt/shared

  druid-overlord:
    image: apache/druid:29.0.1
    mem_limit: ${DRUID_OVERLORD_MEM_LIMIT:-512m}
    cpus: ${DRUID_OVERLORD_CPU_LIMIT:-0.75}
    command: ["overlord"]
    depends_on:
      zookeeper:
        condition: service_started
      druid-postgres:
        condition: service_healthy
      druid-coordinator:
        condition: service_started
    environment:
      - DRUID_XMS=${DRUID_OVERLORD_XMS:-192m}
      - DRUID_XMX=${DRUID_OVERLORD_XMX:-192m}
      - druid_zk_service_host=zookeeper:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://druid-postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/shared/segments
      - druid_indexer_logs_type=file
      - druid_indexer_logs_directory=/opt/shared/indexing-logs
      - druid_extensions_loadList=["druid-kafka-indexing-service","postgresql-metadata-storage"]
      - druid_indexer_runner_type=remote
    volumes:
      - druid_shared:/opt/shared

  druid-broker:
    image: apache/druid:29.0.1
    mem_limit: ${DRUID_BROKER_MEM_LIMIT:-512m}
    cpus: ${DRUID_BROKER_CPU_LIMIT:-0.75}
    command: ["broker"]
    depends_on:
      zookeeper:
        condition: service_started
      druid-postgres:
        condition: service_healthy
      druid-coordinator:
        condition: service_started
      druid-overlord:
        condition: service_started
    environment:
      - DRUID_XMS=${DRUID_BROKER_XMS:-160m}
      - DRUID_XMX=${DRUID_BROKER_XMX:-160m}
      - druid_zk_service_host=zookeeper:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://druid-postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/shared/segments
      - druid_indexer_logs_type=file
      - druid_indexer_logs_directory=/opt/shared/indexing-logs
      - druid_extensions_loadList=["druid-kafka-indexing-service","postgresql-metadata-storage"]
    volumes:
      - druid_shared:/opt/shared

  druid-historical:
    image: apache/druid:29.0.1
    mem_limit: ${DRUID_HISTORICAL_MEM_LIMIT:-768m}
    cpus: ${DRUID_HISTORICAL_CPU_LIMIT:-1.0}
    command: ["historical"]
    depends_on:
      zookeeper:
        condition: service_started
      druid-postgres:
        condition: service_healthy
      druid-coordinator:
        condition: service_started
    environment:
      - DRUID_XMS=${DRUID_HISTORICAL_XMS:-256m}
      - DRUID_XMX=${DRUID_HISTORICAL_XMX:-256m}
      - druid_processing_numThreads=1
      - druid_processing_numMergeBuffers=1
      - druid_processing_buffer_sizeBytes=26214400
      - druid_zk_service_host=zookeeper:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://druid-postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/shared/segments
      - druid_indexer_logs_type=file
      - druid_indexer_logs_directory=/opt/shared/indexing-logs
      - druid_extensions_loadList=["druid-kafka-indexing-service","postgresql-metadata-storage"]
    volumes:
      - druid_shared:/opt/shared

  druid-middlemanager:
    image: apache/druid:29.0.1
    mem_limit: ${DRUID_MIDDLEMANAGER_MEM_LIMIT:-896m}
    cpus: ${DRUID_MIDDLEMANAGER_CPU_LIMIT:-1.0}
    command: ["middleManager"]
    depends_on:
      zookeeper:
        condition: service_started
      druid-postgres:
        condition: service_healthy
      druid-overlord:
        condition: service_started
    environment:
      - DRUID_XMS=${DRUID_MIDDLEMANAGER_XMS:-320m}
      - DRUID_XMX=${DRUID_MIDDLEMANAGER_XMX:-320m}
      - druid_zk_service_host=zookeeper:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://druid-postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/shared/segments
      - druid_indexer_logs_type=file
      - druid_indexer_logs_directory=/opt/shared/indexing-logs
      - druid_extensions_loadList=["druid-kafka-indexing-service","postgresql-metadata-storage"]
      - druid_worker_capacity=2
    volumes:
      - druid_shared:/opt/shared

  druid-router:
    image: apache/druid:29.0.1
    mem_limit: ${DRUID_ROUTER_MEM_LIMIT:-384m}
    cpus: ${DRUID_ROUTER_CPU_LIMIT:-0.5}
    command: ["router"]
    environment:
      - DRUID_XMS=${DRUID_ROUTER_XMS:-128m}
      - DRUID_XMX=${DRUID_ROUTER_XMX:-128m}
      - druid_zk_service_host=zookeeper:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://druid-postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid
      - druid_storage_type=local
      - druid_storage_storageDirectory=/opt/shared/segments
      - druid_indexer_logs_type=file
      - druid_indexer_logs_directory=/opt/shared/indexing-logs
      - druid_extensions_loadList=["druid-kafka-indexing-service","postgresql-metadata-storage"]
    depends_on:
      zookeeper:
        condition: service_started
      druid-postgres:
        condition: service_healthy
      druid-coordinator:
        condition: service_started
      druid-overlord:
        condition: service_started
      druid-broker:
        condition: service_started
    volumes:
      - druid_shared:/opt/shared
    ports:
      - "8889:8888"

  pinot-zookeeper:
    image: zookeeper:3.9
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status | grep -q 'Mode:'"]
      interval: 10s
      timeout: 5s
      retries: 12

  pinot-controller:
    image: apachepinot/pinot:1.2.0
    hostname: pinot-controller
    mem_limit: ${PINOT_CONTROLLER_MEM_LIMIT:-1280m}
    cpus: ${PINOT_CONTROLLER_CPU_LIMIT:-1.0}
    command: ["StartController", "-controllerHost", "pinot-controller", "-zkAddress", "pinot-zookeeper:2181"]
    depends_on:
      pinot-zookeeper:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 18
    ports:
      - "9001:9000"

  pinot-broker:
    image: apachepinot/pinot:1.2.0
    hostname: pinot-broker
    mem_limit: ${PINOT_BROKER_MEM_LIMIT:-1280m}
    cpus: ${PINOT_BROKER_CPU_LIMIT:-1.0}
    command: ["StartBroker", "-brokerHost", "pinot-broker", "-zkAddress", "pinot-zookeeper:2181"]
    depends_on:
      pinot-controller:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/health"]
      interval: 10s
      timeout: 5s
      retries: 18
    ports:
      - "8099:8099"

  pinot-server:
    image: apachepinot/pinot:1.2.0
    hostname: pinot-server
    mem_limit: ${PINOT_SERVER_MEM_LIMIT:-1536m}
    cpus: ${PINOT_SERVER_CPU_LIMIT:-1.5}
    command: ["StartServer", "-serverHost", "pinot-server", "-zkAddress", "pinot-zookeeper:2181"]
    depends_on:
      pinot-controller:
        condition: service_healthy

  materialized:
    image: materialize/materialized:v26.14.1
    mem_limit: ${MATERIALIZE_MEM_LIMIT:-2048m}
    cpus: ${MATERIALIZE_CPU_LIMIT:-1.5}
    restart: unless-stopped
    ports:
      - "6875:6875"
      - "6877:6877"
    depends_on:
      kafka:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    mem_limit: ${OTEL_MEM_LIMIT:-384m}
    cpus: ${OTEL_CPU_LIMIT:-0.75}
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    restart: unless-stopped
    volumes:
      - ./otel/otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      kafka:
        condition: service_healthy
      storage-writer:
        condition: service_started

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    profiles: ["producer"]
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      master-data:
        condition: service_started

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    restart: unless-stopped
    mem_limit: ${KAFKA_UI_MEM_LIMIT:-256m}
    cpus: ${KAFKA_UI_CPU_LIMIT:-0.5}
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "true"
      DYNAMIC_CONFIG_ENABLED: "false"
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy

  storage-writer:
    build:
      context: .
      dockerfile: storage_writer/Dockerfile
    mem_limit: ${STORAGE_WRITER_MEM_LIMIT:-640m}
    cpus: ${STORAGE_WRITER_CPU_LIMIT:-1.0}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACTIVE_STACKS: ${ACTIVE_STACKS:-pinot}
      TARGET_BACKENDS: ${TARGET_BACKENDS:-}
      KAFKA_FANOUT_TARGET_BACKENDS: ${KAFKA_FANOUT_TARGET_BACKENDS:-}
    ports:
      - "8092:8090"
    depends_on:
      kafka:
        condition: service_healthy
      master-data:
        condition: service_started

  realtime-gateway:
    build: ./realtime_gateway
    mem_limit: ${REALTIME_GATEWAY_MEM_LIMIT:-256m}
    cpus: ${REALTIME_GATEWAY_CPU_LIMIT:-0.5}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACTIVE_STACKS: ${ACTIVE_STACKS:-pinot}
    ports:
      - "8083:8080"
    depends_on:
      kafka:
        condition: service_healthy

  api:
    build: ./api
    mem_limit: ${API_MEM_LIMIT:-320m}
    cpus: ${API_CPU_LIMIT:-0.5}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACTIVE_STACKS: ${ACTIVE_STACKS:-pinot}
      API_ALLOWED_BACKENDS: ${API_ALLOWED_BACKENDS:-}
      API_DEFAULT_BACKEND: ${API_DEFAULT_BACKEND:-}
    ports:
      - "8080:8080"
    depends_on:
      - storage-writer

  api-druid:
    build: ./api_druid
    mem_limit: ${API_DRUID_MEM_LIMIT:-320m}
    cpus: ${API_DRUID_CPU_LIMIT:-0.5}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACTIVE_STACKS: ${ACTIVE_STACKS:-pinot}
      API_ALLOWED_BACKENDS: ${API_ALLOWED_BACKENDS:-}
      API_DEFAULT_BACKEND: ${API_DEFAULT_BACKEND:-}
    ports:
      - "8081:8080"
    depends_on:
      - storage-writer

  api-pinot:
    build: ./api_pinot
    mem_limit: ${API_PINOT_MEM_LIMIT:-320m}
    cpus: ${API_PINOT_CPU_LIMIT:-0.5}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACTIVE_STACKS: ${ACTIVE_STACKS:-pinot}
      API_ALLOWED_BACKENDS: ${API_ALLOWED_BACKENDS:-}
      API_DEFAULT_BACKEND: ${API_DEFAULT_BACKEND:-}
    ports:
      - "8082:8080"
    depends_on:
      - storage-writer
      - pinot-broker

  api-materialize:
    build: ./api_materialize
    mem_limit: ${API_MATERIALIZE_MEM_LIMIT:-352m}
    cpus: ${API_MATERIALIZE_CPU_LIMIT:-0.75}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACTIVE_STACKS: ${ACTIVE_STACKS:-pinot}
      API_ALLOWED_BACKENDS: ${API_ALLOWED_BACKENDS:-}
      API_DEFAULT_BACKEND: ${API_DEFAULT_BACKEND:-}
    ports:
      - "8084:8080"
    depends_on:
      - storage-writer
      - materialized

  frontend:
    build:
      context: ./frontend_pinot
      dockerfile: Dockerfile.clickhouse
    mem_limit: ${FRONTEND_MEM_LIMIT:-192m}
    cpus: ${FRONTEND_CPU_LIMIT:-0.5}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

  frontend-druid:
    build:
      context: ./frontend_pinot
      dockerfile: Dockerfile.druid
    mem_limit: ${FRONTEND_DRUID_MEM_LIMIT:-192m}
    cpus: ${FRONTEND_DRUID_CPU_LIMIT:-0.5}
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - api-druid

  frontend-pinot:
    build: ./frontend_pinot
    mem_limit: ${FRONTEND_PINOT_MEM_LIMIT:-192m}
    cpus: ${FRONTEND_PINOT_CPU_LIMIT:-0.5}
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      - api-pinot

  frontend-materialize:
    build:
      context: ./frontend_pinot
      dockerfile: Dockerfile.materialize
    mem_limit: ${FRONTEND_MATERIALIZE_MEM_LIMIT:-192m}
    cpus: ${FRONTEND_MATERIALIZE_CPU_LIMIT:-0.5}
    restart: unless-stopped
    ports:
      - "5176:80"
    depends_on:
      - api-materialize

volumes:
  druid_pgdata:
  druid_shared:
  master_data_store:
