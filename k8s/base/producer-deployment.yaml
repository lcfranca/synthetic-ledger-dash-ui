apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: synthetic-ledger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: synthetic-ledger/producer:latest
          envFrom:
            - configMapRef:
                name: synthetic-ledger-config
