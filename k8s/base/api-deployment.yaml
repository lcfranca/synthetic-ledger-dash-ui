apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: synthetic-ledger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: synthetic-ledger/api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: synthetic-ledger-config
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: synthetic-ledger
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
