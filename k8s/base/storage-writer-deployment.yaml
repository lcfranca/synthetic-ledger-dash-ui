apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-writer
  namespace: synthetic-ledger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage-writer
  template:
    metadata:
      labels:
        app: storage-writer
    spec:
      containers:
        - name: storage-writer
          image: synthetic-ledger/storage-writer:latest
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: synthetic-ledger-config
---
apiVersion: v1
kind: Service
metadata:
  name: storage-writer
  namespace: synthetic-ledger
spec:
  selector:
    app: storage-writer
  ports:
    - name: http
      port: 8090
      targetPort: 8090
